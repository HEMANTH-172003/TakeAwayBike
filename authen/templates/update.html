{% extends 'main.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'authen.css' %}">

<div class="update-page">

    <!-- Watermark -->
    <div class="watermark"></div>

    <!-- Update Card -->
    <div class="update-container">

        <h2>Update Profile</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-grid">

                <div class="input-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" value="{{ data.user.first_name }}">
                </div>

                <div class="input-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name" value="{{ data.user.last_name }}">
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ data.user.email }}">
                </div>

                <div class="input-group">
                    <label>Mobile</label>
                    <input type="text" name="mobile" value="{{ data.mobile }}">
                </div>

                <div class="input-group full-width">
                    <label>Address</label>
                    <input type="text" name="address" value="{{ data.address }}">
                </div>

                <div class="input-group">
                    <label>Profile Image</label>
                    <input type="file" name="profile_image">
                </div>

                <div class="input-group">
                    <label>Document</label>
                    <input type="file" name="document">
                </div>

            </div>

            <button type="submit">Update Profile</button>
        </form>

    </div>

</div>

{% endblock %}
